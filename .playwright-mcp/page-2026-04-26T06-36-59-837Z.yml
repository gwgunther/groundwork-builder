          - generic [ref=e284]: Recommended
          - paragraph [ref=e285]: Warm, confident, and approachable — conversational without being overly casual. Reassuring for anxious patients, clear and direct for high-intent cosmetic and implant seekers.
          - paragraph [ref=e286]: Long Beach has a diverse, community-oriented population. A tone that feels personal and welcoming — especially from Dr. Hoang's voice — will differentiate the practice from corporate DSO competitors. Anxious patients are a large untapped segment who respond strongly to reassuring language, and the absence of current testimonials or FAQs suggests this emotional layer is completely missing.
